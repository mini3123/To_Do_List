<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>
    <h2>🔐 로그인</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p style="color: red;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div>
            <label>아이디:</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label>비밀번호:</label>
            <input type="password" name="password" id="pw_input" required>
            <button type="button" onclick="togglePassword()">👁️ 보기</button>
        </div>
        <br>
        <button type="submit">로그인</button>
    </form>

    <p>계정이 없으신가요? <a href="/signup">회원가입하기</a></p>

    <script>
        function togglePassword() {
            const pwInput = document.getElementById('pw_input');
            if (pwInput.type === 'password') {
                pwInput.type = 'text'; // 텍스트로 변경 (보이게)
            } else {
                pwInput.type = 'password'; // 비밀번호로 변경 (가리기)
            }
        }
    </script>
</body>
</html>
