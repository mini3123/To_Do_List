<div style="text-align: center; margin-bottom: 20px;">
    <a href="/main?year={{ year if month > 1 else year - 1 }}&month={{ month - 1 if month > 1 else 12 }}">◀ 이전 달</a>
    
    <span style="font-size: 24px; font-weight: bold; margin: 0 20px;">
        {{ year }}년 {{ month }}월
    </span>
    
    <a href="/main?year={{ year if month < 12 else year + 1 }}&month={{ month + 1 if month < 12 else 1 }}">다음 달 ▶</a>
</div>
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메인 달력</title>
    <style>
        .container { display: flex; } 
        .calendar { flex: 7; border: 1px solid #ccc; padding: 10px; }
        .todo-list { flex: 3; border: 1px solid #eee; padding: 10px; background: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; }
        td { width: 14%; height: 80px; text-align: center; border: 1px solid #ddd; }
        td {
            width: 14%;      
            height: 60px;    
            vertical-align: top; 
            padding: 5px;
            border: 1px solid #ddd;
        }

        td a {
            text-decoration: none; 
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h2>환영합니다! {{ user_id }}님.</h2>
        <a href="/logout">로그아웃</a>
    </header>

    <div class="container">
        <div class="calendar">
            <h3>{{ year }}년 {{ month }}월</h3>
            <table>
                <tr>
                    <th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th>
                </tr>
                <tr>
                    {% for _ in empty_days %}
                        <td></td>
                    {% endfor %}

                    {% for day in range_last_day %}
                        <td>
                            <a href="/main?year={{ year }}&month={{ month }}&date={{ year }}-{{ '%02d' % month }}-{{ '%02d' % day }}">
                                {{ day }}
                            </a>
                        </td>

                        {% if (empty_days|length + day) % 7 == 0 %}
                            </tr><tr>
                        {% endif %}
                    {% endfor %}
                </tr>
            </table>
        </div>

        <div class="todo-list">
            <h4>할 일 목록</h4>
            <p>날짜를 클릭하면 목록이 보입니다.</p>
        </div>
    </div>
</body>
</html>
