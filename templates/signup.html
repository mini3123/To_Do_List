<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 로그인 페이지와 유사한 테마를 사용하여 통일감 부여 */
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 380px; text-align: center; }
        h2 { color: #4a90e2; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .flash-msg { color: #ff6b6b; font-size: 0.85rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h2>Sign up</h2> 
        {# 회원가입 실패 시 에러 메시지 출력 #}
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="flash-msg">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form action="/signup" method="POST">
            <input type="text" name="username" placeholder="아이디" autocomplete="off" required>
            <input type="password" name="password" placeholder="비밀번호" autocomplete="new-password" required>
            <input type="password" name="confirm_password" placeholder="비밀번호 확인" autocomplete="new-password" required>
            <input type="text" name="name" placeholder="이름" autocomplete="off" required>
            <button type="submit">회원가입 완료</button>
        </form>
    </div>
</body>
</html>
